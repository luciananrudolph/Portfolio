<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luciana Noemi Rudolph — Portfolio</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>

  <!-- ============================================= -->
  <!-- PRELOADER: Full-screen poster + counter       -->
  <!-- Covers the page until the intro animation     -->
  <!-- completes, then removed via JS (.--done).     -->
  <!-- ============================================= -->
  <div class="preloader" id="preloader" aria-hidden="true">
    <div class="preloader__bg" id="preloader-bg">
      <img
        class="preloader__poster --preloading"
        id="preloader-poster"
        src="assets/img/showreel-poster.jpg"
        alt=""
      />
    </div>
    <div class="preloader__counter" id="preloader-counter">
      <span class="preloader__number" id="preloader-number">0</span>
    </div>
  </div>

  <!-- ============================================= -->
  <!-- HEADER: Name + Language Switcher              -->
  <!-- ============================================= -->
  <header class="top">
    <a class="top__logo" href="index.html" aria-label="Home">
      <img src="assets/img/logo-blue.png" alt="LAR logo" />
    </a>

    <a class="name" href="index.html" aria-label="Home">
      LUCIANA NOEMI RUDOLPH
    </a>

    <a class="top__link" href="pages/about.html">About</a>

    <nav class="top__nav" aria-label="Language switcher">
      <div class="lang-dropdown">
        <button class="lang-dropdown__trigger" type="button" aria-haspopup="true" aria-expanded="false">
          <span class="lang-dropdown__active" id="lang-active">EN</span>
        </button>
        <ul class="lang-dropdown__menu">
          <li><button class="lang" type="button" data-lang="en" aria-pressed="true">English</button></li>
          <li><button class="lang" type="button" data-lang="de" aria-pressed="false">Deutsch</button></li>
          <li><button class="lang" type="button" data-lang="pt" aria-pressed="false">Português</button></li>
          <li><button class="lang" type="button" data-lang="es" aria-pressed="false">Español</button></li>
          <li><button class="lang" type="button" data-lang="it" aria-pressed="false">Italiano</button></li>
          <li><button class="lang" type="button" data-lang="nl" aria-pressed="false">Nederlands</button></li>
        </ul>
      </div>
    </nav>
  </header>

  <!-- ============================================= -->
  <!-- MAIN: Project Grid                            -->
  <!-- Four project cards in a responsive grid.      -->
  <!-- Thumbnails start B/W and turn colour on hover.-->
  <!-- ============================================= -->
  <main class="stage">
    <section class="projects" aria-label="Featured projects">

      <!-- Project 1 -->
      <a class="card" href="projects/project1.html" aria-label="View Senegal Secondary School">
        <div class="num" aria-hidden="true" data-reveal="title">01</div>
        <div class="thumb">
          <img src="assets/img/p1.jpg" alt="Senegal Secondary School entrance with earth-block walls and bamboo structure" data-reveal="image" />
        </div>
        <div class="meta">
          <h2 class="title" data-i18n="p1_title">Senegal Secondary School</h2>
          <p class="subtitle" data-i18n="p1_sub">Architecture Competition</p>
        </div>
      </a>

      <!-- Project 2 -->
      <a class="card" href="projects/project2.html" aria-label="View IPAI Communication Center">
        <div class="num" aria-hidden="true" data-reveal="title">02</div>
        <div class="thumb">
          <img src="assets/img/p2.jpg" alt="Aerial view of the IPAI campus model with circular masterplan" data-reveal="image" />
        </div>
        <div class="meta">
          <h2 class="title" data-i18n="p2_title">IPAI Communication Center</h2>
          <p class="subtitle" data-i18n="p2_sub">Internship at MVRDV</p>
        </div>
      </a>

      <!-- Project 3 -->
      <a class="card" href="projects/project3.html" aria-label="View Project 3">
        <div class="num" aria-hidden="true" data-reveal="title">03</div>
        <div class="thumb">
          <img src="assets/img/p3.jpg" alt="Project 3 preview" data-reveal="image" />
        </div>
        <div class="meta">
          <h2 class="title" data-i18n="p3_title">Project 3</h2>
          <p class="subtitle" data-i18n="p3_sub">Short descriptor</p>
        </div>
      </a>

      <!-- Project 4 -->
      <a class="card" href="projects/project4.html" aria-label="View Project 4">
        <div class="num" aria-hidden="true" data-reveal="title">04</div>
        <div class="thumb">
          <img src="assets/img/p4.jpg" alt="Project 4 preview" data-reveal="image" />
        </div>
        <div class="meta">
          <h2 class="title" data-i18n="p4_title">Project 4</h2>
          <p class="subtitle" data-i18n="p4_sub">Short descriptor</p>
        </div>
      </a>

    </section>
  </main>

  <!-- ============================================= -->
  <!-- FOOTER: Minimal (extend as needed)            -->
  <!-- ============================================= -->
  <footer class="site-footer" aria-label="Site footer"></footer>

  <!-- GSAP + plugins (optional; site works without them) -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/Flip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/SplitText.min.js"></script>

  <!-- External JS -->
  <script src="assets/js/main.js"></script>
</body>
</html>
