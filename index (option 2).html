<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luciana Noemi Rudolph — Portfolio</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    /* ── Gallery ── */
    html, body {
      overflow: hidden;
      height: 100%;
    }

    .top {
      position: fixed !important;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      background: var(--color-white);
    }

    .gallery__wrapper {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    .gallery__track {
      display: flex;
      gap: -2vw;
      height: 100%;
      width: max-content;
      align-items: center;
      padding: 0 3vw;
      will-change: transform;
    }

    /* Image container — clips parallax overflow */
    .gallery__media {
      position: relative;
      overflow: hidden;
      height: 55vh;
      aspect-ratio: 4 / 3;
      flex-shrink: 0;
      display: block;
      border: 14px solid #fff;
      box-sizing: border-box;
    }

    /* Image — 200% wide for strong parallax pan */
    .gallery__media__image {
      position: absolute;
      top: 0;
      left: -50%;
      width: 200%;
      height: 100%;
      object-fit: cover;
      will-change: transform;
      filter: grayscale(1);
      transition: filter 400ms ease;
    }

    .gallery__media:hover .gallery__media__image {
      filter: grayscale(0);
    }

    /* ── Scroll indicator ── */
    .scroll-hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-grey-mid);
      opacity: 0.6;
      pointer-events: none;
      z-index: 3;
      transition: opacity 600ms ease;
    }
    .scroll-hint.--hidden { opacity: 0; }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="top">
    <a class="name" href="pages/about.html" aria-label="About Luciana Noemi Rudolph" data-reveal="title">
      LUCIANA NOEMI RUDOLPH
    </a>
    <nav class="langs" aria-label="Language switcher">
      <button class="lang" type="button" data-lang="de" aria-pressed="false">HALLO</button>
      <span class="dot" aria-hidden="true">•</span>
      <button class="lang" type="button" data-lang="pt" aria-pressed="false">OLÁ</button>
      <span class="dot" aria-hidden="true">•</span>
      <button class="lang" type="button" data-lang="en" aria-pressed="true">HELLO</button>
      <span class="dot" aria-hidden="true">•</span>
      <button class="lang" type="button" data-lang="es" aria-pressed="false">HOLA</button>
      <span class="dot" aria-hidden="true">•</span>
      <button class="lang" type="button" data-lang="it" aria-pressed="false">CIAO</button>
      <span class="dot" aria-hidden="true">•</span>
      <button class="lang" type="button" data-lang="nl" aria-pressed="false">GOEDENDAG</button>
    </nav>
  </header>

  <!-- GALLERY -->
  <main class="gallery__wrapper">
    <div class="gallery__track" id="gallery-track">
      <a class="gallery__media" href="projects/project1.html">
        <img src="assets/img/p1.jpg" alt="Project 1" class="gallery__media__image" draggable="false" />
      </a>
      <a class="gallery__media" href="projects/project2.html">
        <img src="assets/img/p2.jpg" alt="Project 2" class="gallery__media__image" draggable="false" />
      </a>
      <a class="gallery__media" href="projects/project3.html">
        <img src="assets/img/p3.jpg" alt="Project 3" class="gallery__media__image" draggable="false" />
      </a>
      <a class="gallery__media" href="projects/project4.html">
        <img src="assets/img/p4.jpg" alt="Project 4" class="gallery__media__image" draggable="false" />
      </a>
    </div>
  </main>

  <div class="scroll-hint" id="scroll-hint">Scroll to explore</div>

  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/Flip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/SplitText.min.js"></script>

  <!-- Main JS (translations, language switcher) -->
  <script src="assets/js/main.js"></script>

  <!-- Horizontal parallax gallery -->
  <script>
  (function () {
    /* ── Math helpers ── */
    function lerp(a, b, t) { return a * (1 - t) + b * t; }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    var track = document.getElementById("gallery-track");
    var wrapper = track.parentElement;
    var images = document.querySelectorAll(".gallery__media__image");
    var hint = document.getElementById("scroll-hint");

    var scroll = {
      current: 0,
      target: 0,
      ease: 0.06,
      limit: 0
    };

    function setLimit() {
      scroll.limit = track.scrollWidth - wrapper.clientWidth;
    }

    /* ── Parallax ── */
    var MAX_SHIFT = 40; // % of image width — strong pan effect

    function applyParallax() {
      var vw = window.innerWidth;
      var center = vw * 0.5;

      images.forEach(function (img) {
        var parent = img.parentElement;
        if (!parent) return;
        var rect = parent.getBoundingClientRect();
        var elCenter = rect.left + rect.width * 0.5;
        var t = clamp((elCenter - center) / center, -1, 1);
        var shift = -t * MAX_SHIFT;
        img.style.transform = "translate3d(" + shift + "%, 0, 0)";
      });
    }

    /* ── Events ── */
    var hasScrolled = false;

    window.addEventListener("wheel", function (e) {
      scroll.target += e.deltaY * 1.5;
      if (!hasScrolled && hint) {
        hasScrolled = true;
        hint.classList.add("--hidden");
      }
    }, { passive: true });

    /* Touch support */
    var touchStart = 0;
    var touchStartTarget = 0;
    window.addEventListener("touchstart", function (e) {
      touchStart = e.touches[0].clientX;
      touchStartTarget = scroll.target;
    }, { passive: true });

    window.addEventListener("touchmove", function (e) {
      var dx = touchStart - e.touches[0].clientX;
      scroll.target = touchStartTarget + dx * 2;
      if (!hasScrolled && hint) {
        hasScrolled = true;
        hint.classList.add("--hidden");
      }
    }, { passive: true });

    window.addEventListener("resize", setLimit, { passive: true });

    /* ── Render loop ── */
    function render() {
      scroll.target = clamp(scroll.target, 0, scroll.limit);
      scroll.current = lerp(scroll.current, scroll.target, scroll.ease);

      // Snap to zero to avoid sub-pixel jitter at rest
      if (Math.abs(scroll.current - scroll.target) < 0.5) {
        scroll.current = scroll.target;
      }

      track.style.transform = "translateX(" + -scroll.current + "px)";
      applyParallax();
      requestAnimationFrame(render);
    }

    /* ── Init ── */
    setLimit();
    render();
  })();
  </script>
</body>
</html>
